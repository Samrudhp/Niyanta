version: '3.8'

# Minimal Docker setup - Only Redis and RabbitMQ
# Neo4j should be installed natively on your system

services:
  # Redis - Cache & State
  redis:
    image: redis:7-alpine
    container_name: niyanta_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: niyanta_rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 3s
      retries: 3

# No volumes defined - data will be lost on container removal
# This is fine for Redis cache and RabbitMQ queue
