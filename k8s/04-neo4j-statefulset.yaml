---
# Neo4j StatefulSet for graph database
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: niyanta
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - port: 7687
      targetPort: 7687
      name: bolt
    - port: 7474
      targetPort: 7474
      name: http

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: niyanta
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.15-enterprise
        ports:
        - containerPort: 7687
          name: bolt
        - containerPort: 7474
          name: http
        env:
        - name: NEO4J_AUTH
          value: "neo4j/CHANGE_THIS_PASSWORD"  # Use ConfigMap NEO4J_PASSWORD instead
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: 7687
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 7687
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /var/lib/neo4j
      volumes:
      - name: data
        emptyDir: {}
