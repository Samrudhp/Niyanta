---
# Namespace for Niyanta
apiVersion: v1
kind: Namespace
metadata:
  name: niyanta

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: niyanta-config
  namespace: niyanta
data:
  # Application
  APP_NAME: "Agentic RAG System"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  
  # Groq API (USE KUBERNETES SECRET - NOT CONFIGMAP)
  # ⚠️  CRITICAL: Replace with actual key via kubectl secret
  # kubectl create secret generic groq-secret --from-literal=GROQ_API_KEY=your_key_here -n niyanta
  GROQ_API_KEY: "gsk_REPLACE_WITH_YOUR_API_KEY"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  
  # Embedding Model
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  EMBEDDING_DIMENSION: "384"
  
  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "CHANGE_THIS_PASSWORD"
  RABBITMQ_QUEUE: "agent_step_queue"
  
  # ChromaDB
  CHROMA_PERSIST_DIR: "./data/chromadb"
  CHROMA_COLLECTION: "knowledge_base"
  
  # Neo4j
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_THIS_PASSWORD"
  
  # RAG Configuration
  RETRIEVAL_TOP_K: "5"
  HYBRID_SEARCH_ENABLED: "true"
  
  # Agentic RAG
  MAX_AGENT_STEPS: "5"
  MAX_REPLANS: "1"
  MAX_STEP_RETRIES: "2"
  AGENT_TIMEOUT_SECONDS: "120"
  
  # Router Thresholds
  COMPLEXITY_THRESHOLD: "0.6"
  CACHE_SIMILARITY_THRESHOLD: "0.92"
  CACHE_TTL_SECONDS: "3600"
