---
# Ingress for external access to backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: niyanta-ingress
  namespace: niyanta
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: "localhost"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
  - host: "niyanta.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
